name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Run self-tests
        run: .build/release/Scheduled --selftest

      - name: Assemble signed .app bundle
        run: make bundle

      - name: Verify bundle
        run: |
          test -d dist/Scheduled.app || { echo "app bundle missing"; exit 1; }
          codesign -dv dist/Scheduled.app

  ios-build:
    name: Build iOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Scheduled.xcodeproj \
            -scheme "Scheduled (iOS)" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | tail -60
