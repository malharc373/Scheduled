# XcodeGen spec for the iOS app. Generate the Xcode project with:
#   brew install xcodegen && xcodegen generate
# then open Scheduled.xcodeproj (or build the "Scheduled (iOS)" scheme).
#
# The iOS app compiles the shared Core sources (Sources/Scheduled/Core) plus the
# iOS-only UI/intents (iOS/). The macOS menu-bar app continues to build via
# SwiftPM + the Makefile; this project targets iOS only.

name: Scheduled
options:
  bundleIdPrefix: com.scheduled
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""          # set your Apple Developer Team ID to sign

targets:
  Scheduled:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Scheduled/Core
      - path: iOS
    settings:
      base:
        PRODUCT_NAME: Scheduled
        PRODUCT_BUNDLE_IDENTIFIER: com.scheduled.ios
        TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Scheduled
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Scheduled creates calendar events from your natural-language input."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Scheduled creates reminders from your natural-language input."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

schemes:
  Scheduled (iOS):
    build:
      targets:
        Scheduled: all
    run:
      config: Debug
